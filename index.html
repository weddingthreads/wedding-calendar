<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스친이들의 결혼 캘린더</title>
<style>
  /* ===== EMR Design Tokens (CSS Variables) ===== */
  :root {
    /* Brand - Soft Blush Pink */
    --brand-25: #FFF9FA; --brand-50: #FFF3F5; --brand-100: #FFE8ED;
    --brand-200: #FFD5DE; --brand-300: #FFB3C4; --brand-400: #F98DA8;
    --brand-500: #EE6B8A; --brand-600: #DC4B6E; --brand-700: #C03558;
    --brand-800: #A12B4A; --brand-900: #872541;

    /* Gray */
    --gray-25: #FCFCFD; --gray-50: #F9FAFB; --gray-100: #F2F4F7;
    --gray-200: #EAECF0; --gray-300: #D0D5DD; --gray-400: #98A2B3;
    --gray-500: #667085; --gray-600: #475467; --gray-700: #344054;
    --gray-800: #1D2939; --gray-900: #101828; --gray-950: #0C111D;

    /* Status */
    --error-50: #FEF3F2; --error-100: #FEE4E2; --error-300: #FDA29B;
    --error-400: #F97066; --error-500: #F04438; --error-600: #D92D20; --error-700: #B42318;
    --warning-50: #FFFAEB; --warning-100: #FEF0C7; --warning-300: #FEC84B;
    --warning-500: #F79009; --warning-600: #DC6803; --warning-700: #B54708;
    --success-50: #ECFDF3; --success-100: #D1FADF; --success-300: #6CE9A6;
    --success-500: #12B76A; --success-600: #039855; --success-700: #027A48;

    /* Semantic */
    --text-primary: var(--gray-900);
    --text-secondary: var(--gray-700);
    --text-tertiary: var(--gray-600);
    --text-quaternary: var(--gray-500);
    --text-placeholder: var(--gray-500);
    --text-brand-primary: var(--brand-900);
    --bg-primary: #FFFFFF;
    --bg-secondary: #FFFBFC;
    --bg-secondary-hover: #FFF5F7;
    --bg-tertiary: #FFF3F5;
    --bg-brand-primary: var(--brand-50);
    --bg-brand-solid: var(--brand-600);
    --border-primary: var(--gray-300);
    --border-secondary: var(--gray-200);
    --border-tertiary: var(--gray-100);

    /* Shadow */
    --shadow-xs: 0px 1px 2px 0px rgba(16,24,40,0.05);
    --shadow-sm: 0px 1px 2px 0px rgba(16,24,40,0.06), 0px 1px 3px 0px rgba(16,24,40,0.10);
    --shadow-md: 0px 2px 4px -2px rgba(16,24,40,0.06), 0px 4px 8px -2px rgba(16,24,40,0.10);
    --shadow-lg: 0px 4px 6px -2px rgba(16,24,40,0.03), 0px 12px 16px -4px rgba(16,24,40,0.08);

    /* Radius */
    --rounded-md: 0.5rem;
    --rounded-lg: 0.625rem;
    --rounded-xl: 0.75rem;
    --rounded-2xl: 1rem;
    --rounded-full: 9999px;

    /* Spacing */
    --spacing-xs: 0.25rem; --spacing-sm: 0.375rem; --spacing-md: 0.5rem;
    --spacing-lg: 0.75rem; --spacing-xl: 1rem; --spacing-2xl: 1.25rem;
    --spacing-3xl: 1.5rem; --spacing-4xl: 2rem;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .header {
    background: linear-gradient(135deg, #FFB3C4 0%, #F98DA8 50%, #EE6B8A 100%);
    padding: var(--spacing-4xl) var(--spacing-2xl) var(--spacing-3xl);
    text-align: center;
  }

  .header h1 {
    font-size: 1.5rem;
    line-height: 2rem;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: var(--spacing-xs);
    letter-spacing: -0.5px;
  }

  .header p {
    font-size: 0.875rem;
    line-height: 1.25rem;
    color: var(--brand-200);
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: var(--spacing-3xl);
    margin-top: var(--spacing-xl);
  }

  .stat-item { text-align: center; }

  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: #FFFFFF;
  }

  .stat-label {
    font-size: 0.75rem;
    line-height: 1.125rem;
    color: var(--brand-200);
    margin-top: 2px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: var(--spacing-2xl);
  }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(249,250,251,0.85);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: var(--spacing-lg);
  }
  .loading-overlay.show { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--brand-600);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.875rem; color: var(--text-tertiary); }

  /* Sync indicator */
  .sync-bar {
    text-align: center;
    padding: var(--spacing-sm);
    font-size: 0.75rem;
    color: var(--text-quaternary);
    background: var(--bg-tertiary);
    cursor: pointer;
    transition: background 0.2s;
  }
  .sync-bar:hover { background: var(--bg-secondary-hover); }
  .sync-bar.error { background: var(--error-50); color: var(--error-600); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: var(--spacing-xs);
    background: var(--bg-tertiary);
    border-radius: var(--rounded-xl);
    padding: var(--spacing-xs);
    margin-bottom: var(--spacing-2xl);
  }

  .tab {
    flex: 1;
    padding: var(--spacing-lg);
    text-align: center;
    border-radius: var(--rounded-lg);
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-quaternary);
    border: none;
    background: transparent;
  }

  .tab.active {
    background: var(--bg-primary);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  /* Form */
  .form-card {
    background: var(--bg-primary);
    border-radius: var(--rounded-2xl);
    padding: var(--spacing-3xl);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--spacing-2xl);
    border: 1px solid var(--border-secondary);
  }

  .form-card h2 {
    font-size: 1.125rem;
    line-height: 1.75rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--spacing-xl);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-lg);
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .form-group input, .form-group textarea {
    padding: var(--spacing-lg) var(--spacing-xl);
    border: 1px solid var(--border-primary);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    line-height: 1.25rem;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .form-group input::placeholder, .form-group textarea::placeholder {
    color: var(--text-placeholder);
  }

  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--brand-300);
    box-shadow: 0px 0px 0px 4px var(--brand-50), var(--shadow-xs);
  }

  .form-group textarea { resize: none; height: 60px; }

  .btn-submit {
    grid-column: 1 / -1;
    padding: var(--spacing-lg);
    background: var(--brand-600);
    color: #FFFFFF;
    border: 1px solid var(--brand-600);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: var(--spacing-xs);
  }

  .btn-submit:hover { background: var(--brand-700); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Calendar */
  .calendar-card {
    background: var(--bg-primary);
    border-radius: var(--rounded-2xl);
    padding: var(--spacing-2xl);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--spacing-2xl);
    border: 1px solid var(--border-secondary);
  }

  .cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-xl);
  }

  .cal-nav button {
    width: 36px; height: 36px;
    border-radius: var(--rounded-full);
    border: 1px solid var(--border-primary);
    background: var(--bg-primary);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background 0.2s;
  }

  .cal-nav button:hover { background: var(--bg-secondary-hover); }

  .cal-nav .cal-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: var(--spacing-xs);
  }

  .cal-weekdays span {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-quaternary);
    padding: var(--spacing-xs);
  }

  .cal-weekdays span:first-child { color: var(--error-400); }
  .cal-weekdays span:last-child { color: var(--brand-500); }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    color: var(--text-primary);
    position: relative;
    cursor: default;
    transition: background 0.15s;
  }

  .cal-day.empty { opacity: 0; }
  .cal-day.today { background: var(--bg-tertiary); font-weight: 700; }

  .cal-day.has-event {
    background: var(--brand-50);
    cursor: pointer;
    font-weight: 600;
    color: var(--brand-700);
  }

  .cal-day.has-event:hover {
    background: var(--brand-100);
  }

  .cal-day .dot-row { display: flex; gap: 2px; margin-top: 2px; }
  .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--brand-500); }
  .cal-day .dot-more { font-size: 8px; color: var(--brand-500); font-weight: 700; }
  .cal-day.sunday { color: var(--error-400); }
  .cal-day.saturday { color: var(--brand-500); }
  .cal-day.has-event.sunday, .cal-day.has-event.saturday { color: var(--brand-700); }

  /* Popup */
  .day-popup {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(16,24,40,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-2xl);
  }

  .day-popup.show { display: flex; }

  .day-popup-content {
    background: var(--bg-primary);
    border-radius: var(--rounded-2xl);
    padding: var(--spacing-3xl);
    max-width: 380px;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
    position: relative;
    box-shadow: var(--shadow-lg);
  }

  .day-popup-close {
    position: absolute;
    top: var(--spacing-lg); right: var(--spacing-lg);
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--gray-400);
  }

  .day-popup h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--spacing-lg);
  }

  /* List */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  .search-bar {
    display: flex;
    gap: var(--spacing-md);
    margin-bottom: var(--spacing-xl);
  }

  .search-bar input {
    flex: 1;
    padding: var(--spacing-lg) var(--spacing-xl);
    border: 1px solid var(--border-primary);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    outline: none;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .search-bar input:focus {
    border-color: var(--brand-300);
    box-shadow: 0px 0px 0px 4px var(--brand-50), var(--shadow-xs);
  }

  .search-bar select {
    padding: var(--spacing-lg) var(--spacing-lg);
    border: 1px solid var(--border-primary);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    outline: none;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .entry-list {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
  }

  .entry-card {
    background: var(--bg-primary);
    border-radius: var(--rounded-xl);
    padding: var(--spacing-xl);
    box-shadow: var(--shadow-xs);
    border: 1px solid var(--border-secondary);
    display: flex;
    align-items: center;
    gap: var(--spacing-xl);
    transition: box-shadow 0.15s;
  }

  .entry-card:hover { box-shadow: var(--shadow-sm); }

  .entry-date-badge {
    width: 48px; height: 52px;
    border-radius: var(--rounded-lg);
    background: var(--brand-600);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .entry-date-badge .month { font-size: 0.625rem; font-weight: 700; color: var(--brand-100); }
  .entry-date-badge .day { font-size: 1.25rem; font-weight: 800; color: #FFFFFF; line-height: 1; }

  .entry-info { flex: 1; min-width: 0; }

  .entry-name { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }

  .entry-detail { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 2px; }

  .entry-memo { font-size: 0.75rem; color: var(--text-quaternary); margin-top: var(--spacing-xs); }

  .entry-actions { display: flex; gap: var(--spacing-sm); }

  .btn-icon {
    width: 32px; height: 32px;
    border-radius: var(--rounded-md);
    border: 1px solid var(--border-secondary);
    background: var(--bg-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-tertiary);
    transition: all 0.2s;
  }

  .btn-icon:hover { background: var(--bg-secondary-hover); }
  .btn-icon.delete:hover { background: var(--error-50); color: var(--error-600); }

  .btn-attend {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    padding: 4px 10px;
    border-radius: var(--rounded-full);
    border: 1px solid var(--brand-200);
    background: var(--brand-50);
    color: var(--brand-700);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-attend:hover { background: var(--brand-100); }
  .btn-attend .attend-count {
    background: var(--brand-600);
    color: #fff;
    border-radius: var(--rounded-full);
    min-width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.625rem;
    font-weight: 700;
  }

  .attendees-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: var(--spacing-xs);
  }
  .attendee-chip {
    display: inline-block;
    padding: 1px 8px;
    border-radius: var(--rounded-full);
    background: var(--brand-50);
    color: var(--brand-700);
    font-size: 0.6875rem;
    font-weight: 500;
  }

  /* Attend modal */
  .attend-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(16,24,40,0.4);
    z-index: 160;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-2xl);
  }
  .attend-modal.show { display: flex; }
  .attend-modal-content {
    background: var(--bg-primary);
    border-radius: var(--rounded-2xl);
    padding: var(--spacing-3xl);
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .attend-modal-content h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--spacing-xl);
  }
  .attend-modal-content input {
    width: 100%;
    padding: var(--spacing-lg) var(--spacing-xl);
    border: 1px solid var(--border-primary);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    outline: none;
    text-align: center;
    margin-bottom: var(--spacing-xl);
  }
  .attend-modal-content input:focus {
    border-color: var(--brand-300);
    box-shadow: 0px 0px 0px 4px var(--brand-50), var(--shadow-xs);
  }
  .attend-modal-btns {
    display: flex;
    gap: var(--spacing-md);
  }
  .attend-modal-btns button {
    flex: 1;
    padding: var(--spacing-lg);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  .upcoming-header {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--spacing-lg);
  }

  .upcoming-tag {
    display: inline-block;
    padding: 2px var(--spacing-md);
    border-radius: var(--rounded-full);
    font-size: 0.75rem;
    font-weight: 500;
    margin-left: var(--spacing-sm);
  }

  .tag-today { background: var(--error-50); color: var(--error-700); }
  .tag-soon { background: var(--warning-50); color: var(--warning-700); }
  .tag-this-month { background: var(--success-50); color: var(--success-700); }

  .empty-state {
    text-align: center;
    padding: var(--spacing-4xl) var(--spacing-2xl);
    color: var(--text-quaternary);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: var(--spacing-lg); }
  .empty-state p { font-size: 0.875rem; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-900);
    color: #FFFFFF;
    padding: var(--spacing-lg) var(--spacing-3xl);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.3s;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-xl);
  }

  .month-btn {
    padding: var(--spacing-sm);
    border: 1px solid var(--border-secondary);
    border-radius: var(--rounded-md);
    background: var(--bg-primary);
    font-size: 0.8125rem;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
  }

  .month-btn:hover { background: var(--bg-secondary-hover); }
  .month-btn.active { background: var(--brand-600); color: #FFFFFF; border-color: var(--brand-600); }
  .month-btn .count { font-size: 0.625rem; color: var(--text-quaternary); display: block; }
  .month-btn.active .count { color: var(--brand-200); }

  /* Edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(16,24,40,0.4);
    z-index: 150;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-2xl);
  }
  .modal-overlay.show { display: flex; }

  .modal-content {
    background: var(--bg-primary);
    border-radius: var(--rounded-2xl);
    padding: var(--spacing-3xl);
    max-width: 400px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }

  .modal-content h3 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--spacing-xl);
  }

  .modal-content .form-group { margin-bottom: var(--spacing-lg); }

  .modal-btns {
    display: flex;
    gap: var(--spacing-md);
    margin-top: var(--spacing-2xl);
  }

  .modal-btns button {
    flex: 1;
    padding: var(--spacing-lg);
    border-radius: var(--rounded-md);
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  .btn-cancel {
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--border-primary);
  }
  .btn-cancel:hover { background: var(--bg-secondary-hover); }

  .btn-save {
    background: var(--brand-600);
    color: #FFFFFF;
  }
  .btn-save:hover { background: var(--brand-700); }

  /* Setup banner */
  .setup-banner {
    background: var(--warning-50);
    border: 1px solid var(--warning-300);
    border-radius: var(--rounded-xl);
    padding: var(--spacing-xl);
    margin-bottom: var(--spacing-2xl);
    font-size: 0.8125rem;
    color: var(--warning-700);
    line-height: 1.6;
  }
  .setup-banner code {
    background: var(--warning-100);

<div class="toast" id="toast"></div>

<script>
  // ============================================
  //  Google Sheets 연동 설정
  // ============================================
  //  아래 URL을 Apps Script 배포 URL로 교체하세요.
  //  비어있으면 오프라인 모드(localStorage)로 동작합니다.
  // ============================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMGOfPjO_LjgFXbDeor-k_GsQC3AKhc7LR8-0JVttxkJJQRp34uumnkTj6Ub_Kynbm/exec';
  // ============================================

  const isOnline = () => SCRIPT_URL.length > 0;
  const STORAGE_KEY = 'wedding_calendar_entries';

  let entries = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let editingId = null;

  // ===== API Helper =====
  async function apiCall(params) {
    const url = new URL(SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error('Network error');
    return res.json();
  }

  // ===== Load / Save =====
  function loadLocal() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveLocal(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  async function loadFromSheet() {
    if (!isOnline()) {
      entries = loadLocal();
      updateSyncBar('오프라인 모드 (localStorage)');
      refreshAll();
      return;
    }

    showLoading(true);
    try {
      const result = await apiCall({ action: 'read' });
      if (result.success) {
        entries = result.entries;
        saveLocal(entries); // cache locally
        updateSyncBar(`동기화 완료 (${new Date().toLocaleTimeString('ko')})`);
      } else {
        throw new Error(result.error);
      }
    } catch (err) {
      console.error('Load error:', err);
      entries = loadLocal();
      updateSyncBar('동기화 실패 - 캐시 데이터 사용 중', true);
    }
    showLoading(false);
    refreshAll();
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').classList.toggle('show', show);
  }

  function updateSyncBar(text, isError) {
    const bar = document.getElementById('syncBar');
    bar.textContent = text + ' (클릭하여 새로고침)';
    bar.classList.toggle('error', !!isError);
  }

  function refreshAll() {
    updateStats();
    renderUpcoming();
    renderCalendar();
    if (document.getElementById('panel-list').classList.contains('active')) {
      renderList();
    }
  }

  // ===== Toast =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ===== Tabs =====
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'calendar') renderCalendar();
      if (tab.dataset.tab === 'list') renderList();
      if (tab.dataset.tab === 'tips' && !tipsLoaded) loadTips();
      if (tab.dataset.tab === 'buddy' && !buddyLoaded) loadBuddyCodes();
    });
  });

  // ===== Add Entry =====
  async function addEntry() {
    const name = document.getElementById('inputName').value.trim();
    const date = document.getElementById('inputDate').value;
    const time = document.getElementById('inputTime').value;
    const spouse = document.getElementById('inputSpouse').value.trim();
    const contact = document.getElementById('inputContact').value.trim();
    const memo = document.getElementById('inputMemo').value.trim();

    if (!name) { showToast('이름을 입력해주세요'); return; }
    if (!date) { showToast('결혼일을 선택해주세요'); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      if (isOnline()) {
        const result = await apiCall({ action: 'add', name, date, time, spouse, contact, memo });
        if (result.success) {
          entries.push(result.entry);
          saveLocal(entries);
        } else {
          throw new Error(result.error);
        }
      } else {
        const entry = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name, date, time, spouse, contact, memo,
          createdAt: new Date().toISOString()
        };
        entries.push(entry);
        saveLocal(entries);
      }

      // Clear form
      document.getElementById('inputName').value = '';
      document.getElementById('inputDate').value = '';
      document.getElementById('inputTime').value = '';
      document.getElementById('inputSpouse').value = '';
      document.getElementById('inputContact').value = '';
      document.getElementById('inputMemo').value = '';

      showToast(`${name}님의 결혼일이 등록되었습니다!`);
      refreshAll();
    } catch (err) {
      showToast('등록 실패: ' + err.message);
    }

    btn.disabled = false;

  // ===== Calendar =====
  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;

    const daysEl = document.getElementById('calDays');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date();

    const eventMap = {};
    entries.forEach(e => {
      const d = parseDate(e.date);
      if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
        const key = d.getDate();
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(e);
      }
    });

    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

    for (let day = 1; day <= lastDate; day++) {
      const dow = (firstDay + day - 1) % 7;
      const isToday = day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
      const evts = eventMap[day] || [];
      const classes = ['cal-day'];
      if (isToday) classes.push('today');
      if (evts.length > 0) classes.push('has-event');
      if (dow === 0) classes.push('sunday');
      if (dow === 6) classes.push('saturday');

      const onclick = evts.length > 0 ? `onclick="showDayPopup(${currentYear},${currentMonth},${day})"` : '';
      let dots = '';
      if (evts.length > 0 && evts.length <= 3) {
        dots = `<div class="dot-row">${evts.map(() => '<div class="dot"></div>').join('')}</div>`;
      } else if (evts.length > 3) {
        dots = `<div class="dot-row"><div class="dot"></div><div class="dot"></div><span class="dot-more">+${evts.length - 2}</span></div>`;
      }

      html += `<div class="${classes.join(' ')}" ${onclick}>${day}${dots}</div>`;
    }

    daysEl.innerHTML = html;
    renderMonthGrid();
  }

  // ===== Helpers =====
  // D-day 계산: 미래 날짜면 실제 날짜까지, 과거 날짜면 올해/내년 기념일까지
  function getDaysUntil(dateStr) {
    const d = parseDate(dateStr);
    if (!d) return Infinity;
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 결혼일 자체가 미래면 실제 날짜까지 D-day
    const original = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (original >= today) {
      return Math.ceil((original - today) / (1000 * 60 * 60 * 24));
    }

    // 과거 결혼일이면 올해 기념일 기준
    const thisYear = today.getFullYear();
    const next = new Date(thisYear, d.getMonth(), d.getDate());
    if (next < today) next.setFullYear(thisYear + 1);
    return Math.ceil((next - today) / (1000 * 60 * 60 * 24));
  }

  // 시간대 이슈 방지: 날짜를 로컬 시간대로 안전하게 파싱
  function parseDate(dateStr) {
    if (!dateStr) return null;
    const str = String(dateStr);
    // ISO datetime (2026-08-27T15:00:00.000Z) → 로컬 시간대로 변환
    if (str.includes('T')) {
      const d = new Date(str);
      if (!isNaN(d)) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
      return null;
    }
    // YYYY-MM-DD 순수 날짜 문자열
    const parts = str.split('-');
    if (parts.length === 3) {
      return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    }
    return new Date(str);
  }

  // Sheets가 시간을 1899-12-30T... Date로 변환하는 문제 방어
  // UTC → 로컬 시간대(KST 등)로 자동 변환
  function parseTime(timeVal) {
    if (!timeVal) return '';
    const str = String(timeVal);
    // 이미 HH:MM 형식이면 그대로
    if (/^\d{1,2}:\d{2}$/.test(str)) return str;
    // 1899-12-30T07:00:00.000Z 같은 ISO 형태 → Date로 파싱하여 로컬 시간 추출
    if (str.includes('T')) {
      const d = new Date(str);
      if (!isNaN(d)) {
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        return `${h}:${m}`;
      }
    }
    return '';
  }

  function formatDate(dateStr) {
    const d = parseDate(dateStr);
    if (!d || isNaN(d)) return '';
    const days = ['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}. (${days[d.getDay()]})`;
  }

  }

  // ===== Tips Tab =====
  const TIPS_SHEET_ID = '1JuxYbX9SbzVr1hTfeRWyAQpgGLIK1u8Ad-HrGBIQ2Ww';

  // JSONP-style loader for Google Sheets (works from file:// too)
  function loadSheetJSONP(sheetId, sheetName) {
    return new Promise((resolve, reject) => {
      const callbackName = '_sheetCb_' + Math.random().toString(36).slice(2);
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${callbackName}&sheet=${encodeURIComponent(sheetName)}`;
      window[callbackName] = function(response) {
        delete window[callbackName];
        document.body.removeChild(script);
        if (response && response.table) {
          const rows = (response.table.rows || []).map(r =>
            (r.c || []).map(cell => cell ? (cell.v != null ? String(cell.v) : '') : '')
          );
          resolve(rows);
        } else {
          reject(new Error('Invalid response'));
        }
      };
      const script = document.createElement('script');
      script.src = url;
      script.onerror = () => { delete window[callbackName]; reject(new Error('Script load failed')); };
      document.body.appendChild(script);
    });
  }

  function parseTipsCSV(csv) {
    const lines = csv.split('\n');
    const result = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      // CSV parsing with quoted fields
      const cols = parseCSVLine(line);
      if (cols.length >= 3) {
        result.push({
          category: cols[0].replace(/^"|"$/g, ''),
          tip: cols[1].replace(/^"|"$/g, ''),
          tags: cols[2].replace(/^"|"$/g, '').split(',').map(t => t.trim()).filter(Boolean)
        });
      }
    }
    return result;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += ch;
      }
    }
    result.push(current);
    return result;
  }

  function getCategories() {
    const cats = {};
    tipsData.forEach(t => {
      cats[t.category] = (cats[t.category] || 0) + 1;
    });
    return cats;
  }

  function renderTipsChips() {
    const cats = getCategories();
    const container = document.getElementById('tipsChips');
    const total = tipsData.length;

    let html = `<button class="chip ${activeCategory === '전체' ? 'active' : ''}" onclick="setCategory('전체')">전체 <span class="chip-count">${total}</span></button>`;

    Object.entries(cats).forEach(([cat, count]) => {
      const isActive = activeCategory === cat ? 'active' : '';
      html += `<button class="chip ${isActive}" onclick="setCategory('${esc(cat)}')">${esc(cat)} <span class="chip-count">${count}</span></button>`;
    });

    container.innerHTML = html;
  }

  function setCategory(cat) {
    activeCategory = cat;
    document.getElementById('tipsSearch').value = '';
    renderTipsChips();
    renderTips();
  }

  function filterTips() {
    renderTips();
  }

  function renderTips() {
    const searchQuery = document.getElementById('tipsSearch').value.trim().toLowerCase();
    const container = document.getElementById('tipsAccordion');

    // Filter
    let filtered = tipsData;
    if (activeCategory !== '전체') {
      filtered = filtered.filter(t => t.category === activeCategory);
    }
    if (searchQuery) {
      filtered = filtered.filter(t =>
        t.tip.toLowerCase().includes(searchQuery) ||
        t.tags.some(tag => tag.toLowerCase().includes(searchQuery)) ||
        t.category.toLowerCase().includes(searchQuery)
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = '<div class="tips-empty">검색 결과가 없습니다.</div>';
      return;
    }

    // Group by category
    const grouped = {};
    filtered.forEach(t => {
      if (!grouped[t.category]) grouped[t.category] = [];
      grouped[t.category].push(t);
    });

    // If search is active, auto-expand all; otherwise first category or selected one
    const isSearching = searchQuery.length > 0;
    const isSingleCategory = activeCategory !== '전체';

    let html = '';
    Object.entries(grouped).forEach(([cat, tips], idx) => {
      const shouldOpen = isSearching || isSingleCategory || idx === 0;
      html += `
        <div class="accordion ${shouldOpen ? 'open' : ''}" data-cat="${esc(cat)}">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span class="accordion-title">${esc(cat)}</span>
            <div class="accordion-meta">
              <span class="accordion-count">${tips.length}건</span>
              <span class="accordion-arrow">▼</span>
            </div>
          </div>
          <div class="accordion-body">
            ${tips.map(t => `
              <div class="tip-card">
                <div class="tip-text">${highlightSearch(esc(t.tip), searchQuery)}</div>
                <div class="tip-tags">
                  ${t.tags.map(tag => `<span class="tip-tag" onclick="searchByTag('${esc(tag)}')">${esc(tag)}</span>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
  }

  function toggleAccordion(header) {
    header.parentElement.classList.toggle('open');
  }

  function searchByTag(tag) {
    activeCategory = '전체';
    document.getElementById('tipsSearch').value = tag;
    renderTipsChips();
    renderTips();
  }

  function highlightSearch(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark style="background:var(--brand-100);color:var(--brand-800);border-radius:2px;padding:0 2px;">$1</mark>');
  }

  // ===== Buddy Code Tab =====
  const BUDDY_SHEET_ID = '1JuxYbX9SbzVr1hTfeRWyAQpgGLIK1u8Ad-HrGBIQ2Ww';
  const BUDDY_SHEET_NAME = '짝꿍코드';
  let buddyData = [];
  let buddyLoaded = false;
  const BUDDY_STORAGE_KEY = 'wedding_buddy_codes';

  async function loadBuddyCodes() {
    const listEl = document.getElementById('buddyAccordion');
    listEl.innerHTML = '<div class="tips-loading">짝꿍코드를 불러오는 중...</div>';

    try {
      const rows = await loadSheetJSONP(BUDDY_SHEET_ID, BUDDY_SHEET_NAME);
      buddyData = rows.filter(r => r[0]).map(r => ({
        vendor: r[0] || '',
        category: r[1] || '기타',
        code: r[2] || '',
        benefit: r[3] || '',
        expiry: r[4] || '',
      }));
      buddyLoaded = true;
      const local = JSON.parse(localStorage.getItem(BUDDY_STORAGE_KEY) || '[]');
      local.forEach(l => {
        if (!buddyData.some(b => b.vendor === l.vendor && b.code === l.code)) {
          buddyData.push({ ...l, pending: true });
        }
      });
      renderBuddyChips();
      renderBuddyList();
    } catch (err) {
      console.error('Buddy load error:', err);
      buddyData = JSON.parse(localStorage.getItem(BUDDY_STORAGE_KEY) || '[]');
      if (buddyData.length) {
        renderBuddyChips();
        renderBuddyList();
      } else {
        document.getElementById('buddyAccordion').innerHTML = '<div class="tips-empty">짝꿍코드를 불러올 수 없습니다.<br>시트 공유 설정을 확인해주세요.</div>';
      }
    }
  }

  function parseBuddyCSV(csv) {
    const lines = csv.split('\n');
    const result = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = parseCSVLine(line);
      if (cols.length >= 3) {
        result.push({
          vendor: cols[0].replace(/^"|"$/g, ''),
          category: (cols[1] || '').replace(/^"|"$/g, '') || '기타',
          code: (cols[2] || '').replace(/^"|"$/g, ''),
          benefit: (cols[3] || '').replace(/^"|"$/g, ''),
          expiry: (cols[4] || '').replace(/^"|"$/g, '') || '',
        });
      }
    }
    return result;
  }

  let activeBuddyCategory = '전체';

  function getBuddyCategories() {
    const cats = {};
    buddyData.forEach(b => {
      const cat = b.category || '기타';
      cats[cat] = (cats[cat] || 0) + 1;
    });
    return cats;
  }

  function renderBuddyChips() {
    const cats = getBuddyCategories();
    const container = document.getElementById('buddyChips');
    const total = buddyData.length;
    let html = `<button class="chip ${activeBuddyCategory === '전체' ? 'active' : ''}" onclick="setBuddyCategory('전체')">전체 <span class="chip-count">${total}</span></button>`;
    Object.entries(cats).forEach(([cat, count]) => {
      const isActive = activeBuddyCategory === cat ? 'active' : '';
      html += `<button class="chip ${isActive}" onclick="setBuddyCategory('${esc(cat)}')">${esc(cat)} <span class="chip-count">${count}</span></button>`;
    });
    container.innerHTML = html;
  }

  function setBuddyCategory(cat) {
    activeBuddyCategory = cat;
    document.getElementById('buddySearch').value = '';
    renderBuddyChips();
    renderBuddyList();
  }

  function renderBuddyList() {
    const query = document.getElementById('buddySearch').value.trim().toLowerCase();
    let filtered = buddyData;

    if (activeBuddyCategory !== '전체') {
      filtered = filtered.filter(b => b.category === activeBuddyCategory);
    }
    if (query) {
      filtered = filtered.filter(b =>
        b.vendor.toLowerCase().includes(query) ||
        b.benefit.toLowerCase().includes(query) ||
        b.category.toLowerCase().includes(query) ||
        b.code.toLowerCase().includes(query)
      );
    }

    const container = document.getElementById('buddyAccordion');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="tips-empty">등록된 짝꿍코드가 없습니다.</div>';
      return;
    }

    const now = new Date();
    now.setHours(0, 0, 0, 0);

    // Sort within each group: expired last, then expiry asc
    filtered.sort((a, b) => {
      const aExp = a.expiry ? new Date(a.expiry) : null;
      const bExp = b.expiry ? new Date(b.expiry) : null;
      const aExpired = aExp && aExp < now;
      const bExpired = bExp && bExp < now;
      if (aExpired !== bExpired) return aExpired ? 1 : -1;
      if (aExp && bExp) return aExp - bExp;
      if (aExp) return -1;
      return 1;
    });

    // Group by category
    const grouped = {};
    filtered.forEach(b => {
      const cat = b.category || '기타';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(b);
    });

    const isSearching = query.length > 0;
    const isSingleCategory = activeBuddyCategory !== '전체';

    const categoryIcons = {
      '스냅': '📷', 'DVD/영상': '🎥', '드레스': '👗', '메이크업': '💄',
      '스튜디오': '📸', '반지/예물': '💍', '사회자': '🎤', '허니문': '🏝',
      '기타': '🎁'
    };

    let html = '';
    Object.entries(grouped).forEach(([cat, items], idx) => {
      const shouldOpen = isSearching || isSingleCategory || idx === 0;

      const cardsHtml = items.map(b => {
        let isExpired = false;
        let expiryLabel = '';
        if (b.expiry) {
          const expDate = new Date(b.expiry);
          if (!isNaN(expDate)) {
            isExpired = expDate < now;
            const diff = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
            if (isExpired) {
              expiryLabel = '마감됨';
            } else if (diff <= 14) {
              expiryLabel = `D-${diff}`;
            } else {
              expiryLabel = b.expiry.slice(0, 10) + ' 마감';
            }
          }
        }

        let icon = '🎁';
        for (const [key, ic] of Object.entries(categoryIcons)) {
          if (b.category.startsWith(key)) { icon = ic; break; }
        }

        return `
          <div class="buddy-card ${isExpired ? 'stale' : ''}">
            <div class="buddy-icon">${icon}</div>
            <div class="buddy-info">
              <div class="buddy-vendor">${esc(b.vendor)}</div>
              ${b.code ? '<div class="buddy-benefit" style="font-weight:600;color:var(--brand-700);">코드: ' + esc(b.code) + '</div>' : ''}
              <div class="buddy-benefit">${esc(b.benefit)}</div>
              <div class="buddy-meta">
                ${expiryLabel ? '<span' + (isExpired ? ' style="color:var(--error-600);"' : expiryLabel.startsWith('D-') ? ' style="color:var(--warning-600);font-weight:600;"' : '') + '>' + expiryLabel + '</span>' : ''}
                ${b.pending ? '<span style="color:var(--warning-600);">시트 반영 대기중</span>' : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');

      html += `
        <div class="accordion ${shouldOpen ? 'open' : ''}" data-cat="${esc(cat)}">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span class="accordion-title">${esc(cat)}</span>
            <div class="accordion-meta">
              <span class="accordion-count">${items.length}건</span>
              <span class="accordion-arrow">▼</span>
            </div>
          </div>
          <div class="accordion-body">
            ${cardsHtml}
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
  }

  async function addBuddyCode() {
    const vendor = document.getElementById('buddyVendor').value.trim();
    const category = document.getElementById('buddyCategory').value;
    const code = document.getElementById('buddyCode').value.trim();
    const benefit = document.getElementById('buddyBenefit').value.trim();
    const expiry = document.getElementById('buddyExpiry').value;

    if (!vendor) { showToast('업체명을 입력해주세요'); return; }
    if (!code) { showToast('코드를 입력해주세요'); return; }
    if (!benefit) { showToast('혜택 내용을 입력해주세요'); return; }

    // Check duplicate
    if (buddyData.some(b => b.vendor === vendor && b.code === code)) {
      showToast('이미 같은 업체에 등록된 코드입니다');
      return;
    }

    const btn = document.getElementById('btnBuddySubmit');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    const entry = { vendor, category, code, benefit, expiry };

    try {
      if (isOnline()) {
        const result = await apiCall({
          action: 'addBuddy',
          vendor, category, code, benefit, expiry
        });
        if (result.success) {
          buddyData.push(entry);
        } else {
          throw new Error(result.error || 'Unknown error');
        }
      } else {
        throw new Error('offline');
      }
    } catch (err) {
      entry.pending = true;
      buddyData.push(entry);
      const local = JSON.parse(localStorage.getItem(BUDDY_STORAGE_KEY) || '[]');
      local.push(entry);
      localStorage.setItem(BUDDY_STORAGE_KEY, JSON.stringify(local));
    }

    document.getElementById('buddyVendor').value = '';
    document.getElementById('buddyCode').value = '';
    document.getElementById('buddyBenefit').value = '';
    document.getElementById('buddyExpiry').value = '';

    showToast(`${vendor} 짝꿍코드가 등록되었습니다!`);
    renderBuddyChips();
    renderBuddyList();

    btn.disabled = false;
    btn.textContent = '등록하기';
  }

  // ===== Init =====
  if (!isOnline()) {
    document.getElementById('setupBanner').style.display = 'block';
  }
  loadFromSheet();
</script>
